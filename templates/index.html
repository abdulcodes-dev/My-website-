<!DOCTYPE html>
<html>
<head>
    <title>GenZ Assistant</title>
    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }
        h1 { color: #7c3aed; }
        textarea {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #7c3aed;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 10px 30px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .response {
            margin-top: 30px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <h1>🤖 GenZ Assistant</h1>
    <p>Built by Abdul Ahad</p>
    <form action="/ask" method="POST">
        <textarea name="question" rows="4" placeholder="Ask me anything..."></textarea>
        <br>
        <button type="submit">Ask AI</button>
    </form>
    {% if response %}
    <div class="response">
        <p>{{ response }}</p>
    </div>
    {% endif %}
</body>
</html>
